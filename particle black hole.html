<!DOCTYPE html>
<html>
<head>
    <title>Gravity Well</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; cursor: crosshair; }
        canvas { display: block; }
        .info { 
            position: absolute; top: 20px; left: 20px; 
            color: rgba(255,255,255,0.3); font-family: monospace; pointer-events: none; 
        }
    </style>
</head>
<body>
    <div class="info">CLICK & HOLD TO CREATE GRAVITY</div>
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.width = window.innerWidth, ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    let mouse = { x: -1000, y: -1000, active: false };

    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
            this.color = `hsl(${Math.random() * 60 + 180}, 80%, 60%)`;
            this.size = Math.random() * 2 + 0.5;
        }
        update() {
            if (mouse.active) {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let force = Math.min(2, 500 / dist);
                this.vx += (dx / dist) * force * 0.2;
                this.vy += (dy / dist) * force * 0.2;
            }
            
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= 0.98; // Friction
            this.vy *= 0.98;

            if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < 1500; i++) particles.push(new Particle());

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // Trail effect
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animate);
    }

    window.onmousedown = (e) => { mouse.active = true; updateMouse(e); };
    window.onmouseup = () => { mouse.active = false; };
    window.onmousemove = (e) => { updateMouse(e); };
    function updateMouse(e) { mouse.x = e.clientX; mouse.y = e.clientY; }
    
    animate();
</script>
</body>
</html>
