<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Cube Dash</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { background: #44aaff; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: pointer; }
        .ui { position: absolute; top: 20px; color: white; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui">
        <h2 id="status">CLICK OR SPACE TO JUMP</h2>
        <p>Attempts: <span id="attempts">1</span></p>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const attemptsEl = document.getElementById("attempts");

    // Game Constants
    const GROUND_Y = 350;
    const GRAVITY = 0.6;
    const JUMP_FORCE = -12;
    const SPEED = 5;

    let attempts = 1;
    let gameActive = true;

    // Player Object
    let player = {
        x: 100,
        y: GROUND_Y - 40,
        size: 40,
        dy: 0,
        onGround: false,
        rotation: 0
    };

    // Obstacles
    let obstacles = [];
    function spawnObstacle() {
        if (!gameActive) return;
        obstacles.push({ x: canvas.width, y: GROUND_Y, width: 30, height: 40 });
        // Randomly spawn next spike between 1-2 seconds
        setTimeout(spawnObstacle, 1000 + Math.random() * 1000);
    }

    function resetGame() {
        attempts++;
        attemptsEl.innerText = attempts;
        player.y = GROUND_Y - 40;
        player.dy = 0;
        player.rotation = 0;
        obstacles = [];
        gameActive = true;
    }

    function jump() {
        if (player.onGround && gameActive) {
            player.dy = JUMP_FORCE;
            player.onGround = false;
        }
    }

    function update() {
        if (!gameActive) return;

        // Physics
        player.dy += GRAVITY;
        player.y += player.dy;

        // Ground Collision
        if (player.y + player.size > GROUND_Y) {
            player.y = GROUND_Y - player.size;
            player.dy = 0;
            player.onGround = true;
            // Snap rotation to 90 degrees on landing
            player.rotation = Math.round(player.rotation / 90) * 90;
        } else {
            player.onGround = false;
            player.rotation += 5; // Rotation in air
        }

        // Move Obstacles
        obstacles.forEach((spike, index) => {
            spike.x -= SPEED;

            // Collision Detection
            if (
                player.x < spike.x + spike.width &&
                player.x + player.size > spike.x &&
                player.y < spike.y &&
                player.y + player.size > spike.y - spike.height
            ) {
                gameActive = false;
                setTimeout(resetGame, 500); // Quick delay before restart
            }

            // Remove off-screen obstacles
            if (spike.x + spike.width < 0) obstacles.splice(index, 1);
        });
    }

    function draw() {
        // Draw Background
        ctx.fillStyle = "#44aaff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Ground
        ctx.fillStyle = "#0055ff";
        ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.strokeRect(0, GROUND_Y, canvas.width, 1);

        // Draw Player (Cube)
        ctx.save();
        ctx.translate(player.x + player.size/2, player.y + player.size/2);
        ctx.rotate(player.rotation * Math.PI / 180);
        ctx.fillStyle = "#ffff00";
        ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;
        ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
        ctx.restore();

        // Draw Spikes
        ctx.fillStyle = "#ff3300";
        obstacles.forEach(spike => {
            ctx.beginPath();
            ctx.moveTo(spike.x, spike.y);
            ctx.lineTo(spike.x + spike.width / 2, spike.y - spike.height);
            ctx.lineTo(spike.x + spike.width, spike.y);
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.stroke();
        });
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // Input Listeners
    window.addEventListener("keydown", (e) => { if (e.code === "Space" || e.code === "ArrowUp") jump(); });
    canvas.addEventListener("mousedown", jump);

    // Start
    spawnObstacle();
    gameLoop();
</script>
</body>
</html>
