<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap Game - Goal: 100k</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; background-color: #1a1a1a; color: white; margin: 0; 
        }
        .stat-box { font-size: 2.5rem; margin-bottom: 20px; text-align: center; }
        .sub-stat { font-size: 1.1rem; color: #00d4ff; margin-top: 5px; }
        .goal-text { font-size: 0.9rem; color: #ffcc00; margin-bottom: 10px; }
        
        #tap-btn { 
            width: 180px; height: 180px; border-radius: 50%; border: none;
            background: linear-gradient(145deg, #007bff, #0056b3); color: white;
            font-size: 1.5rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px #003d80; transition: 0.1s; user-select: none;
        }
        #tap-btn:active { transform: translateY(4px); box-shadow: 0 4px #003d80; }
        
        .upgrade-section { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; width: 320px; }
        .btn { padding: 12px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .upgrade-btn { background: #28a745; box-shadow: 0 4px #1e7e34; }
        .auto-btn { background: #6f42c1; box-shadow: 0 4px #4d2d8a; }
        .btn:disabled { background: #444; box-shadow: 0 4px #222; opacity: 0.6; cursor: not-allowed; }

        .checkpoint-section { margin-top: 30px; padding: 15px; border: 2px dashed #555; border-radius: 10px; display: flex; gap: 10px; }
        .save-btn { background: #ffc107; color: #000; }
        .load-btn { background: #17a2b8; color: #fff; }

        /* Win Overlay */
        #win-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        #win-overlay h1 { font-size: 3rem; color: #ffcc00; }
    </style>
</head>
<body>

    <div id="win-overlay">
        <h1>Congratulations, you won! 🎉</h1>
        <p>You reached 100,000 taps!</p>
        <button onclick="location.reload()" class="btn" style="background:#007bff">Play Again</button>
    </div>

    <div class="goal-text">GOAL: 100,000 TAPS</div>
    <div class="stat-box">
        <div id="score-display">0 Taps</div>
        <div id="tpc-display" class="sub-stat">Power: 1 tap/click</div>
        <div id="tps-display" class="sub-stat" style="color: #a278ff;">Auto: 0/sec</div>
    </div>

    <button id="tap-btn">TAP!</button>

    <div class="upgrade-section">
        <button id="upgrade-btn" class="btn upgrade-btn">Upgrade Tap (Cost: 10)</button>
        <button id="auto1-btn" class="btn auto-btn">Auto Clicker +5/sec (Cost: 1000)</button>
        <button id="auto2-btn" class="btn auto-btn">Auto Clicker +10/sec (Cost: 2000)</button>
    </div>

    <div class="checkpoint-section">
        <button onclick="saveGame()" class="btn save-btn">💾 CREATE CHECKPOINT</button>
        <button onclick="loadGame()" class="btn load-btn">🔄 LOAD CHECKPOINT</button>
    </div>

<script>
    let score = 0;
    let tapsPerClick = 1;
    let tapsPerSecond = 0;
    let upgradeLevel = 1;
    let hasWon = false;
    
    const costMilestones = [10, 50, 100, 200, 500, 1000, 1250];

    function checkWin() {
        if (score >= 100000 && !hasWon) {
            hasWon = true;
            document.getElementById('win-overlay').style.display = 'flex';
        }
    }

    function getTapPowerCost() {
        const index = upgradeLevel - 1;
        if (index < costMilestones.length) return costMilestones[index];
        return costMilestones[costMilestones.length - 1] + ((upgradeLevel - costMilestones.length) * 250);
    }

    function updateUI() {
        document.getElementById('score-display').innerText = `${Math.floor(score).toLocaleString()} Taps`;
        document.getElementById('tpc-display').innerText = `Power: ${tapsPerClick} taps/click`;
        document.getElementById('tps-display').innerText = `Auto: ${tapsPerSecond} taps/sec`;
        
        const powerCost = getTapPowerCost();
        document.getElementById('upgrade-btn').innerText = `Upgrade Tap Power (Cost: ${powerCost})`;
        document.getElementById('upgrade-btn').disabled = score < powerCost;
        document.getElementById('auto1-btn').disabled = score < 1000;
        document.getElementById('auto2-btn').disabled = score < 2000;
        
        checkWin();
    }

    document.getElementById('tap-btn').addEventListener('click', () => { score += tapsPerClick; updateUI(); });

    document.getElementById('upgrade-btn').addEventListener('click', () => {
        const cost = getTapPowerCost();
        if (score >= cost) { score -= cost; upgradeLevel++; tapsPerClick++; updateUI(); }
    });

    document.getElementById('auto1-btn').addEventListener('click', () => {
        if (score >= 1000) { score -= 1000; tapsPerSecond += 5; updateUI(); }
    });

    document.getElementById('auto2-btn').addEventListener('click', () => {
        if (score >= 2000) { score -= 2000; tapsPerSecond += 10; updateUI(); }
    });

    function saveGame() {
        const gameData = { score, tapsPerClick, tapsPerSecond, upgradeLevel };
        localStorage.setItem('tapGameCheckpoint', JSON.stringify(gameData));
        alert("Checkpoint Reached!");
    }

    function loadGame() {
        const savedData = localStorage.getItem('tapGameCheckpoint');
        if (savedData) {
            const data = JSON.parse(savedData);
            score = data.score;
            tapsPerClick = data.tapsPerClick;
            tapsPerSecond = data.tapsPerSecond;
            upgradeLevel = data.upgradeLevel;
            updateUI();
            alert("Checkpoint Loaded!");
        }
    }

    setInterval(() => { if (tapsPerSecond > 0) { score += tapsPerSecond; updateUI(); } }, 1000);
    updateUI();
</script>

</body>
</html>
