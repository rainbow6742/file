<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GD Clone JS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; font-size: 20px; font-weight: bold; }
        #endScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">Time: <span id="time">60</span>s</div>
    <div id="endScreen">
        <h1 id="endTitle">GAME OVER</h1>
        <p>Tap to Restart</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiTime = document.getElementById('time');
    const endScreen = document.getElementById('endScreen');
    const endTitle = document.getElementById('endTitle');

    // Resize canvas
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Game Constants
    const GRAVITY = 0.8;
    const JUMP_FORCE = -13;
    const GROUND_Y = canvas.height - 100;
    const CUBE_X = 100;
    const GAME_DURATION = 60; // seconds

    // Game State
    let cube = { y: GROUND_Y - 40, vy: 0, size: 40, jumping: false };
    let obstacles = [];
    let gameSpeed = 6;
    let frames = 0;
    let isGameOver = false;
    let isGameWon = false;
    let startTime;
    let animationId;
    let isHolding = false;

    // Obstacle Management
    function spawnObstacle() {
        let type = Math.random() > 0.3 ? 'spike' : 'block';
        let x = canvas.width;
        let y = GROUND_Y;
        let width = type === 'spike' ? 40 : 50;
        let height = type === 'spike' ? 40 : 50;
        obstacles.push({ x, y, width, height, type });
    }

    // Input Handling
    function jump() {
        if (!cube.jumping && !isGameOver) {
            cube.vy = JUMP_FORCE;
            cube.jumping = true;
        }
    }

    function startTouch(e) {
        if (isGameOver) {
            resetGame();
        } else {
            isHolding = true;
            jump();
        }
        e.preventDefault();
    }

    function endTouch() { isHolding = false; }

    window.addEventListener('mousedown', startTouch);
    window.addEventListener('mouseup', endTouch);
    window.addEventListener('touchstart', startTouch);
    window.addEventListener('touchend', endTouch);

    function resetGame() {
        cube = { y: GROUND_Y - 40, vy: 0, size: 40, jumping: false };
        obstacles = [];
        frames = 0;
        isGameOver = false;
        isGameWon = false;
        gameSpeed = 6;
        endScreen.style.display = 'none';
        startTime = Date.now();
        gameLoop();
    }

    function gameLoop() {
        if (isGameOver) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Timer
        let elapsed = Math.floor((Date.now() - startTime) / 1000);
        let remaining = GAME_DURATION - elapsed;
        uiTime.innerText = Math.max(0, remaining);

        if (remaining <= 0) {
            endGame(true);
            return;
        }

        // Background / Ground
        ctx.fillStyle = "#333";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00FF00"; // Ground color
        ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);

        // Cube Physics
        cube.vy += GRAVITY;
        cube.y += cube.vy;

        if (cube.y + cube.size > GROUND_Y) {
            cube.y = GROUND_Y - cube.size;
            cube.vy = 0;
            cube.jumping = false;
        }

        // Draw Cube
        ctx.fillStyle = "#00FFFF";
        ctx.fillRect(CUBE_X, cube.y, cube.size, cube.size);
        ctx.strokeStyle = "white";
        ctx.strokeRect(CUBE_X, cube.y, cube.size, cube.size);

        // Obstacles
        if (frames % 90 === 0) spawnObstacle(); // Spawn rate

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= gameSpeed;

            // Draw Obstacles
            ctx.fillStyle = o.type === 'spike' ? "#FF4444" : "#FFCC00";
            if (o.type === 'spike') {
                ctx.beginPath();
                ctx.moveTo(o.x, o.y);
                ctx.lineTo(o.x + o.width / 2, o.y - o.height);
                ctx.lineTo(o.x + o.width, o.y);
                ctx.fill();
            } else {
                ctx.fillRect(o.x, o.y - o.height, o.width, o.height);
            }

            // Collision Detection
            if (
                CUBE_X + cube.size > o.x &&
                CUBE_X < o.x + o.width &&
                cube.y + cube.size > (o.type === 'spike' ? o.y - o.height : o.y - o.height)
            ) {
                endGame(false);
            }

            // Remove off-screen
            if (o.x < -100) obstacles.splice(i, 1);
        }

        frames++;
        requestAnimationFrame(gameLoop);
    }

    function endGame(won) {
        isGameOver = true;
        endScreen.style.display = 'flex';
        endTitle.innerText = won ? "YOU WIN!" : "GAME OVER";
        endTitle.style.color = won ? "#00FF00" : "#FF4444";
    }

    // Start
    resetGame();

</script>
</body>
</html>
