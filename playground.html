<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE NEON CORE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: crosshair; font-family: 'Courier New', monospace; }
        canvas { position: absolute; top: 0; left: 0; }
        #ui { position: relative; color: #0ff; text-align: center; pointer-events: none; z-index: 10; text-shadow: 0 0 10px #0ff; }
        .hint { font-size: 0.8rem; color: #005555; margin-top: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <h1>NEON CORE</h1>
        <div class="hint">CLICK TO PULSE & PLAY</div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];
    let audioCtx = null;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    // Audio Setup
    function playNote(freq) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 1.5);
    }

    class Pulse {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.r = 0;
            this.hue = Math.random() * 360;
            this.opacity = 1;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.strokeStyle = `hsla(${this.hue}, 100%, 50%, ${this.opacity})`;
            ctx.lineWidth = 2;
            ctx.stroke();
            this.r += 10;
            this.opacity -= 0.02;
        }
    }

    function drawGrid(time) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, width, height);

        const spacing = 40;
        const centerX = width / 2;
        const centerY = height / 2;

        ctx.strokeStyle = '#003333';
        ctx.lineWidth = 1;

        for (let x = 0; x < width; x += spacing) {
            for (let y = 0; y < height; y += spacing) {
                const dist = Math.hypot(x - centerX, y - centerY);
                const offset = Math.sin(dist / 50 - time / 500) * 20;
                
                ctx.beginPath();
                ctx.rect(x + offset, y + offset, 2, 2);
                ctx.stroke();
            }
        }
    }

    function animate(time) {
        drawGrid(time);
        
        particles = particles.filter(p => p.opacity > 0);
        particles.forEach(p => p.draw());
        
        requestAnimationFrame(animate);
    }

    window.addEventListener('mousedown', (e) => {
        particles.push(new Pulse(e.clientX, e.clientY));
        // Map Y position to musical frequency
        const freq = 200 + (height - e.clientY);
        playNote(freq);
    });

    window.addEventListener('resize', resize);
    resize();
    animate(0);
</script>
</body>
</html>
