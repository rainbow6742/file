<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crystal Hunter Generator</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #0f0f1a; 
            color: #00ffcc; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
        }
        .profile-card {
            background: #1a1a2e;
            border: 2px solid #4d4dff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(77, 77, 255, 0.4);
            text-align: center;
            width: 350px;
        }
        h2 { margin-top: 0; color: #ff00ff; text-transform: uppercase; letter-spacing: 2px; }
        .stat { margin: 10px 0; font-size: 1.1rem; }
        .label { color: #888; font-size: 0.8rem; display: block; text-transform: uppercase; }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #4d4dff;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover { background: #3333cc; }
        .crystal-icon { font-size: 3rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="crystal-icon">💎</div>
        <h2 id="name">Press to Find Hunter</h2>
        
        <div class="stat">
            <span class="label">Target Crystal</span>
            <span id="crystal">---</span>
        </div>
        
        <div class="stat">
            <span class="label">Current Location</span>
            <span id="location">---</span>
        </div>

        <div class="stat">
            <span class="label">Hunting Tool</span>
            <span id="tool">---</span>
        </div>

        <button onclick="generateHunter()">FIND NEW HUNTER</button>
    </div>

    <script>
        const names = ["Silas Stone", "Jasper 'The Pick' Reed", "Kaelen Quartz", "Bouldin McRock", "Garnet Thorne", "Zane Geode"];
        const crystals = ["Void Amethyst", "Solar Topaz", "Glacial Sapphire", "Neon Emerald", "Dragon's Heart Ruby", "Obsidian Shard"];
        const locations = ["The Whispering Ravine", "Echoing Salt Flats", "Crystal Peak Summit", "The Forgotten Underdark", "Volcanic Geode Vein"];
        const tools = ["Sonic Resonance Tuner", "Diamond-Tipped Chisel", "Gravitational Sledge", "Laser Precision Pickaxe", "Ancient Dowsing Rod"];

        function generateHunter() {
            document.getElementById('name').innerText = names[Math.floor(Math.random() * names.length)];
            document.getElementById('crystal').innerText = crystals[Math.floor(Math.random() * crystals.length)];
            document.getElementById('location').innerText = locations[Math.floor(Math.random() * locations.length)];
            document.getElementById('tool').innerText = tools[Math.floor(Math.random() * tools.length)];
            
            // Randomize the crystal icon color slightly
            const colors = ['#00ffcc', '#ff00ff', '#4d4dff', '#ffff00', '#ff4d4d'];
            document.querySelector('.crystal-icon').style.color = colors[Math.floor(Math.random() * colors.length)];
        }
    </script>
</body>
</html>
