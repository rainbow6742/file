<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20-Key White Piano</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #333;
            margin: 0;
            overflow-x: auto;
        }
        .piano {
            display: flex;
            background: #111;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .key {
            width: 40px;
            height: 180px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            font-size: 12px;
            color: #888;
            user-select: none;
            transition: background 0.1s, transform 0.05s;
        }
        .key:active, .key.active {
            background: #e0e0e0;
            transform: translateY(2px);
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="piano" id="piano">
    <!-- 20 keys will be generated here -->
</div>

<script>
    const piano = document.getElementById('piano');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Function to play a frequency
    function playNote(frequency) {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 1);
    }

    // Generate 20 white keys
    // Starting from C3 (approx 130.81 Hz)
    for (let i = 0; i < 20; i++) {
        const key = document.createElement('div');
        key.className = 'key';
        
        // Calculate frequency (Equal Temperament)
        // This simplified math mimics a continuous scale
        const freq = 130.81 * Math.pow(2, i / 7); 
        
        key.addEventListener('mousedown', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playNote(freq);
        });

        piano.appendChild(key);
    }
</script>

</body>
</html>
